<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidak Ada Koneksi — Absensi Semarang</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f5ff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .box {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      max-width: 320px; width: 100%;
      box-shadow: 0 20px 60px rgba(75,0,130,0.15);
    }
    .ico { font-size: 64px; margin-bottom: 20px; }
    h1 { color: #4b0082; font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    p  { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4b0082, #9333ea);
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ico">📡</div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Absensi membutuhkan koneksi internet untuk mengirim data dan GPS.<br><br>Pastikan WiFi atau data seluler aktif, lalu coba lagi.</p>
    <button onclick="location.reload()">🔄 Coba Lagi</button>
  </div>
</body>
</html>
